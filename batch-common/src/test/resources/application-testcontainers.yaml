spring:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  batch:
    jdbc:
      initialize-schema: never   # init-testcontainers-schema.sql 에서 직접 생성
    job:
      enabled: false
  cloud:
    task:
      initialize-enabled: false
  output:
    ansi:
      enabled: always

notification:
  scheduler:
    enabled: false
    initial-delay: 3600000   # 테스트 중 자동 실행 방지

movie:
  scheduler:
    enabled: false
    initial-delay: 3600000   # 테스트 중 자동 실행 방지

logging:
  level:
    org.springframework.batch: INFO
